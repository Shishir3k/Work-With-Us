<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Work With Us</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f9f9f9;
      font-family: 'Segoe UI', sans-serif;
    }
    .form-container {
      max-width: 600px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<div class="form-container">
  <h2 class="text-center mb-4">Work With Us</h2>
  <form id="applicantForm">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-control" name="name" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-control" name="email" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Mobile Number</label>
      <input type="tel" class="form-control" name="phone" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Address</label>
      <input type="text" class="form-control" name="address" required>
    </div>
    <div class="mb-3">
      <label class="form-label">What Can You Do?</label>
      <textarea class="form-control" name="skills" rows="4" required></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Portfolio / Resume Link (optional)</label>
      <input type="url" class="form-control" name="portfolio">
    </div>
    <button type="submit" class="btn btn-primary w-100">Submit Application</button>
  </form>
</div>

<script>
  const form = document.getElementById('applicantForm');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    try {
      const response = await fetch("/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });

      if (response.ok) {
        window.location.href = "thank-you.html";
      } else {
        alert("Submission failed. Try again later.");
      }
    } catch (err) {
      console.error(err);
      alert("Something went wrong. 😢");
    }
  });
</script>

</body>
</html>
